<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dogesniffer</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="difficulty-bar">
        <button class="btn-win active" data-diff="beginner">Beginner</button>
        <button class="btn-win" data-diff="intermediate">Intermediate</button>
        <button class="btn-win" data-diff="expert">Expert</button>
        <button class="btn-win" id="lb-btn">🏆</button>
      </div>

      <div id="panel">
        <div id="status">
          <div id="poop-counter" class="lcd">010</div>
          <button id="reset-btn" title="New Game">
            <img id="doge-img" src="/src/doge.png" alt="Doge" width="52" height="52" />
          </button>
          <div id="timer" class="lcd">000</div>
        </div>
        <div id="board"></div>
      </div>
    </div>

    <!-- Win name entry modal -->
    <div id="name-modal" class="modal-backdrop modal-hidden">
      <div class="modal-box">
        <div class="modal-title">🏆 You Win!</div>
        <label for="name-input">Enter your name:</label>
        <input id="name-input" class="name-input" type="text" maxlength="20" placeholder="Anonymous" />
        <button class="btn-win" id="name-submit">OK</button>
      </div>
    </div>

    <!-- Leaderboard modal -->
    <div id="lb-modal" class="modal-backdrop modal-hidden">
      <div class="modal-box">
        <div class="modal-title">🏆 Best Times</div>
        <table id="lb-table">
          <thead><tr><th>Difficulty</th><th>Name</th><th>Best Time</th></tr></thead>
          <tbody></tbody>
        </table>
        <button class="btn-win" id="lb-close">Close</button>
        <button class="btn-win" id="lb-clear">Clear</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
