<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Neck / chest fur -->
  <ellipse cx="50" cy="92" rx="22" ry="14" fill="#F5E6C8"/>

  <!-- Head base (slightly brighter when winning) -->
  <ellipse cx="50" cy="52" rx="38" ry="36" fill="#EDCF72"/>

  <!-- Forehead lighter patch -->
  <ellipse cx="50" cy="36" rx="22" ry="16" fill="#F5DF8A"/>

  <!-- Left ear (perked up) -->
  <polygon points="13,42 6,6 31,27" fill="#C8962A"/>
  <polygon points="15,40 10,13 27,27" fill="#E8A0A0"/>

  <!-- Right ear -->
  <polygon points="87,42 94,6 69,27" fill="#C8962A"/>
  <polygon points="85,40 90,13 73,27" fill="#E8A0A0"/>

  <!-- Cheek fur puffs -->
  <ellipse cx="16" cy="60" rx="10" ry="12" fill="#EDCF72"/>
  <ellipse cx="84" cy="60" rx="10" ry="12" fill="#EDCF72"/>

  <!-- White/cream muzzle -->
  <ellipse cx="50" cy="68" rx="20" ry="16" fill="#FDF3DC"/>

  <!-- Happy squint eyes — ^_^ arcs -->
  <path d="M22,46 Q32,38 42,46" stroke="#1A0800" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M58,46 Q68,38 78,46" stroke="#1A0800" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Happy raised eyebrows -->
  <path d="M20,39 Q32,31 43,36" stroke="#8B5E15" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M57,36 Q68,31 80,39" stroke="#8B5E15" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <ellipse cx="50" cy="60" rx="7" ry="5" fill="#1A0800"/>
  <ellipse cx="47.5" cy="58.5" rx="2" ry="1.5" fill="#3A1800" opacity="0.6"/>

  <!-- Big grin -->
  <path d="M36,70 Q50,80 64,70" stroke="#1A0800" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Tongue -->
  <ellipse cx="50" cy="77" rx="7" ry="5.5" fill="#FF7777"/>
  <line x1="50" y1="72" x2="50" y2="82" stroke="#CC4444" stroke-width="1.5"/>

  <!-- Big happy blush -->
  <ellipse cx="16" cy="68" rx="8" ry="6" fill="#FF6666" opacity="0.45"/>
  <ellipse cx="84" cy="68" rx="8" ry="6" fill="#FF6666" opacity="0.45"/>

  <!-- Chin fur -->
  <ellipse cx="50" cy="83" rx="14" ry="6" fill="#FDF3DC"/>
</svg>
