<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Neck / chest fur -->
  <ellipse cx="50" cy="92" rx="22" ry="14" fill="#F5E6C8"/>

  <!-- Head base -->
  <ellipse cx="50" cy="52" rx="38" ry="36" fill="#E8C97A"/>

  <!-- Forehead lighter patch -->
  <ellipse cx="50" cy="36" rx="22" ry="16" fill="#F0D88A"/>

  <!-- Left ear -->
  <polygon points="14,44 8,10 32,30" fill="#C8962A"/>
  <polygon points="16,42 11,16 28,30" fill="#E8A0A0"/>

  <!-- Right ear -->
  <polygon points="86,44 92,10 68,30" fill="#C8962A"/>
  <polygon points="84,42 89,16 72,30" fill="#E8A0A0"/>

  <!-- Cheek fur puffs -->
  <ellipse cx="16" cy="60" rx="10" ry="12" fill="#E8C97A"/>
  <ellipse cx="84" cy="60" rx="10" ry="12" fill="#E8C97A"/>

  <!-- White/cream muzzle -->
  <ellipse cx="50" cy="68" rx="20" ry="16" fill="#FDF3DC"/>

  <!-- Left eye shadow -->
  <ellipse cx="32" cy="50" rx="10" ry="9" fill="#C8962A" opacity="0.4"/>
  <!-- Right eye shadow -->
  <ellipse cx="68" cy="50" rx="10" ry="9" fill="#C8962A" opacity="0.4"/>

  <!-- Left eye white -->
  <ellipse cx="32" cy="49" rx="8" ry="7.5" fill="white"/>
  <!-- Right eye white -->
  <ellipse cx="68" cy="49" rx="8" ry="7.5" fill="white"/>

  <!-- Left iris (brown, slightly towards center — doge side-eye) -->
  <ellipse cx="34" cy="50" rx="5.5" ry="6" fill="#6B3A10"/>
  <!-- Right iris -->
  <ellipse cx="66" cy="50" rx="5.5" ry="6" fill="#6B3A10"/>

  <!-- Left pupil -->
  <ellipse cx="34.5" cy="50" rx="3.5" ry="4" fill="#0D0600"/>
  <!-- Right pupil -->
  <ellipse cx="65.5" cy="50" rx="3.5" ry="4" fill="#0D0600"/>

  <!-- Eye shine -->
  <circle cx="36" cy="47" r="1.8" fill="white"/>
  <circle cx="68" cy="47" r="1.8" fill="white"/>

  <!-- Eyebrows (raised on inner side — the classic doge "wow" look) -->
  <path d="M22,40 Q32,33 42,38" stroke="#8B5E15" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M58,38 Q68,33 78,40" stroke="#8B5E15" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <ellipse cx="50" cy="60" rx="7" ry="5" fill="#1A0800"/>
  <!-- Nose highlight -->
  <ellipse cx="47.5" cy="58.5" rx="2" ry="1.5" fill="#3A1800" opacity="0.6"/>

  <!-- Mouth -->
  <path d="M44,68 Q50,71 56,68" stroke="#1A0800" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Blush -->
  <ellipse cx="18" cy="67" rx="7" ry="5" fill="#FF9090" opacity="0.35"/>
  <ellipse cx="82" cy="67" rx="7" ry="5" fill="#FF9090" opacity="0.35"/>

  <!-- Chin fur -->
  <ellipse cx="50" cy="82" rx="14" ry="6" fill="#FDF3DC"/>
</svg>
